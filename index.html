<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>Nimbus — Carta intestata</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   NIMBUS — CARTA INTESTATA (variante unica)
   A4 reale, header compatto, menu come protagonista.
   ============================================================ */

/* ---------- Tokens ---------- */
:root {
  --lh-ink: #1B1A20;
  --lh-ink-soft: #3A3947;
  --lh-muted: #6F6E7A;
  --lh-mute2: #9B9AA6;
  --lh-hairline: #E6E5EC;
  --lh-paper: #FFFFFF;
  --lh-tint: #F4F4F8;
  --lh-accent-default: #7B89C9;
}

/* ---------- Page A4 ---------- */
.lh-page {
  width: 210mm;
  min-height: 297mm;
  background: var(--lh-paper);
  color: var(--lh-ink);
  position: relative;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 9.5pt;
  line-height: 1.5;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  --accent: var(--lh-accent-default);
  --dens: 1;
}

.lh-cloud {
  /* Margini di pagina più stretti per dare spazio al menu */
  padding: 14mm 16mm 14mm 16mm;
}

/* Filigrana (sottilissima) */
.lh-watermark {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  pointer-events: none;
  z-index: 0;
}
.lh-watermark img {
  width: 60%;
  opacity: 0.05;
}

/* ============================================================
   HEADER compatto: logo a sx, meta a dx
   ============================================================ */
.lh-e-header {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 16mm;
  padding-bottom: 3mm;
}
.lh-e-logo img {
  height: 11mm;
  width: auto;
  display: block;
}
.lh-e-header-meta {
  display: grid;
  grid-template-columns: repeat(3, auto);
  gap: 8mm;
  justify-content: end;
}
.lh-field {
  display: flex;
  flex-direction: column;
  gap: 2px;
  text-align: left;
}
.lh-field-k {
  font-size: 6.5pt;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--lh-muted);
}
.lh-field-v {
  font-size: 9pt;
  font-weight: 500;
  color: var(--lh-ink);
  letter-spacing: -0.005em;
}

.lh-e-rule {
  position: relative;
  z-index: 1;
  height: 1px;
  background: var(--accent);
  margin-bottom: 5mm;
}

/* ============================================================
   DESTINATARIO + OGGETTO
   ============================================================ */
.lh-e-recipient-grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 12mm;
  margin-bottom: calc(4mm * var(--dens));
}
.lh-e-spettile {
  font-size: 7pt;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 3px;
}
.lh-e-name {
  font-size: 11.5pt;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--lh-ink);
  margin-bottom: 3px;
}
.lh-e-addr {
  font-size: 8.5pt;
  color: var(--lh-ink-soft);
  line-height: 1.5;
}
.lh-e-subject-text {
  margin: 0;
  font-family: 'Fraunces', 'Inter', serif;
  font-weight: 400;
  font-size: 15pt;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--lh-ink);
  text-wrap: pretty;
  max-width: 18em;
}

/* Body (intro) */
.lh-e-body {
  position: relative;
  z-index: 1;
  margin-bottom: calc(3mm * var(--dens));
}
.lh-e-body p {
  margin: 0 0 calc(2mm * var(--dens)) 0;
  font-size: 9pt;
  line-height: 1.5;
  color: var(--lh-ink);
  text-wrap: pretty;
  max-width: 56em;
}
.lh-e-body p:last-child { margin-bottom: 0; }

/* ============================================================
   SECTION head numerata
   ============================================================ */
.lh-e-section {
  position: relative;
  z-index: 1;
  margin-top: calc(5mm * var(--dens));
  page-break-inside: auto;
  break-inside: auto;
}
.lh-e-section-head {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 8mm;
  align-items: baseline;
  padding-bottom: 1.5mm;
  margin-bottom: calc(2mm * var(--dens));
  border-bottom: 1px solid var(--lh-ink);
  page-break-after: avoid;
  break-after: avoid;
}
.lh-e-section-num {
  font-family: 'Fraunces', 'Inter', serif;
  font-weight: 300;
  font-size: 14pt;
  color: var(--accent);
  letter-spacing: -0.02em;
  line-height: 1;
}
.lh-e-section-title {
  margin: 0;
  font-family: 'Inter', sans-serif;
  font-size: 10pt;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--lh-ink);
}
.lh-e-section-intro {
  margin: 0 0 calc(2.5mm * var(--dens)) 0;
  font-size: 8pt;
  color: var(--lh-muted);
  font-style: italic;
  max-width: 56em;
}

/* ============================================================
   MENU — sezioni descrittive (food, beverage, ecc.)
   ============================================================ */
.lh-sezioni {
  display: flex;
  flex-direction: column;
  gap: calc(2mm * var(--dens));
  margin-bottom: calc(2mm * var(--dens));
}
.lh-sez {
  position: relative;
  padding: calc(2.5mm * var(--dens)) 0;
  border-bottom: 1px solid var(--lh-hairline);
}
.lh-sez:last-child { border-bottom: 0; }
.lh-sez-main {
  display: block;
}
.lh-sez-head {
  margin-bottom: 1.5mm;
}
.lh-sez-del {
  position: absolute;
  left: -7mm;
  top: 50%;
  transform: translateY(-50%);
  width: 5mm; height: 5mm;
  border-radius: 50%;
  border: 1px solid var(--lh-hairline);
  background: #fff;
  color: var(--lh-mute2);
  font-size: 11pt;
  line-height: 1;
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s;
  display: grid;
  place-items: center;
  padding: 0;
}
.lh-sez:hover .lh-sez-del { opacity: 1; }
.lh-sez-del:hover {
  background: #FEE;
  border-color: #C44;
  color: #C44;
}
.lh-sez-label {
  font-family: 'Inter', sans-serif;
  font-size: 7.5pt;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  display: block !important;
  width: 100%;
}
.lh-sez-desc {
  font-size: 9.5pt;
  color: var(--lh-ink);
  line-height: 1.5;
  letter-spacing: -0.005em;
}

/* Prezzo menu cumulato (in fondo alle sezioni) */
.lh-menu-price {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: calc(3mm * var(--dens)) 4mm;
  margin-top: calc(2mm * var(--dens));
  background: var(--lh-tint);
  border-radius: 4px;
  align-items: center;
}
.lh-menu-price-k {
  display: block;
  font-family: 'Inter', sans-serif;
  font-size: 9pt;
  font-weight: 600;
  color: var(--lh-ink);
  letter-spacing: -0.005em;
  margin-bottom: 1px;
}
.lh-menu-price-sub {
  font-size: 7.5pt;
  color: var(--lh-muted);
  font-style: italic;
}
.lh-menu-price-r {
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
.lh-menu-price-ppg {
  font-family: 'Fraunces', serif;
  font-size: 14pt;
  font-weight: 500;
  color: var(--lh-ink);
  letter-spacing: -0.02em;
  white-space: nowrap;
}
.lh-menu-price-unit {
  font-family: 'Inter', sans-serif;
  font-size: 9pt;
  font-weight: 500;
  color: var(--lh-muted);
  letter-spacing: 0;
}
.lh-menu-price-tot {
  font-size: 8.5pt;
  color: var(--lh-muted);
  font-feature-settings: 'tnum';
  white-space: nowrap;
}
.lh-menu-price-formula { color: var(--lh-mute2); }
.lh-menu-price-tot b { color: var(--lh-ink); font-weight: 600; }

/* ============================================================
   EXTRAS
   ============================================================ */
.lh-extras-block {
  margin-top: calc(6mm * var(--dens));
}
.lh-extras-head {
  font-family: 'Inter', sans-serif;
  font-size: 7.5pt;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--lh-ink);
  margin: 0 0 calc(1.5mm * var(--dens)) 0;
  padding-bottom: 1mm;
  border-bottom: 1px solid var(--lh-ink);
}
.lh-extras {
  display: flex;
  flex-direction: column;
}
.lh-extra {
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8mm;
  padding: calc(2mm * var(--dens)) 0;
  border-bottom: 1px solid var(--lh-hairline);
  align-items: baseline;
}
.lh-extra:last-of-type { border-bottom: 0; }
.lh-extra-del {
  position: absolute;
  left: -7mm;
  top: 50%;
  transform: translateY(-50%);
  width: 5mm; height: 5mm;
  border-radius: 50%;
  border: 1px solid var(--lh-hairline);
  background: #fff;
  color: var(--lh-mute2);
  font-size: 11pt;
  line-height: 1;
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s;
  display: grid;
  place-items: center;
  padding: 0;
}
.lh-extra:hover .lh-extra-del { opacity: 1; }
.lh-extra-del:hover {
  background: #FEE;
  border-color: #C44;
  color: #C44;
}
.lh-extra-label {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt;
  font-weight: 600;
  color: var(--lh-ink);
  letter-spacing: -0.005em;
  display: block !important;
  width: 100%;
}
.lh-extra-desc {
  font-size: 8.5pt;
  color: var(--lh-muted);
  line-height: 1.5;
  margin-top: 1px;
}
.lh-extra-price {
  text-align: right;
  white-space: nowrap;
  font-feature-settings: 'tnum';
}
.lh-extra-ppg {
  font-family: 'Fraunces', serif;
  font-size: 11pt;
  font-weight: 500;
  color: var(--lh-ink);
  letter-spacing: -0.01em;
}
.lh-extra-unit {
  font-family: 'Inter', sans-serif;
  font-size: 8pt;
  color: var(--lh-muted);
  font-weight: 500;
  letter-spacing: 0;
}
.lh-extra-kind {
  background: transparent;
  border: 1px dashed var(--lh-mute2);
  color: var(--lh-muted);
  font-family: inherit;
  font-size: 7pt;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 4px;
  cursor: pointer;
  letter-spacing: 0.04em;
  text-transform: lowercase;
}
.lh-extra-kind:hover {
  border-style: solid;
  border-color: var(--accent);
  color: var(--accent);
}
.only-print { display: none; }
@media print {
  .only-print { display: inline; }
}
.lh-extra-subtotal {
  font-size: 8pt;
  color: var(--lh-muted);
  margin-top: 1px;
  font-feature-settings: 'tnum';
}
.lh-extra-formula { color: var(--lh-mute2); }
.lh-extra-amount {
  font-weight: 600;
  color: var(--lh-ink);
}

/* Pulsante "+ Aggiungi" */
.lh-add-row {
  margin-top: calc(1.5mm * var(--dens));
}
.lh-add-row button {
  background: none;
  border: 1px dashed var(--lh-mute2);
  color: var(--lh-muted);
  font-size: 8pt;
  padding: 1.2mm 4mm;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
.lh-add-row button:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Editable numerico inline (per i prezzi nel corpo) */
.lh-edit.lh-edit-num {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  color: var(--lh-ink);
  display: inline;
  min-width: 2ch;
}

/* ============================================================
   TOTALI — listino + sconto + prezzo riservato
   ============================================================ */
.lh-totali {
  margin-top: calc(5mm * var(--dens));
  margin-left: auto;
  width: 95mm;
  background: var(--lh-tint);
  border-radius: 4px;
  padding: 4mm 5mm;
  display: flex;
  flex-direction: column;
  gap: 1.5mm;
}
.lh-tot-listino, .lh-tot-sconto {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 9pt;
  color: var(--lh-ink-soft);
  font-feature-settings: 'tnum';
  gap: 12px;
}
.lh-tot-listino .lh-tot-k,
.lh-tot-sconto .lh-tot-k {
  white-space: nowrap;
}
.lh-tot-listino .lh-tot-v,
.lh-tot-sconto .lh-tot-v {
  font-weight: 600;
  color: var(--lh-ink);
  white-space: nowrap;
}
.lh-tot-listino.has-discount .lh-tot-v {
  text-decoration: line-through;
  color: var(--lh-muted);
  font-weight: 500;
}
.lh-tot-sconto .lh-tot-k {
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-size: 7.5pt;
}
.lh-tot-sconto .lh-tot-v {
  color: var(--accent);
  font-weight: 700;
}
.lh-tot-pct {
  color: var(--lh-mute2);
  font-weight: 500;
  font-size: 0.85em;
  margin-left: 4px;
}
.lh-tot-final {
  margin-top: 2mm;
  padding-top: 2.5mm;
  border-top: 1px solid var(--lh-ink);
}
.lh-tot-final-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
}
.lh-tot-final-row .lh-tot-k {
  font-weight: 700;
  color: var(--lh-ink);
  font-size: 11pt;
  letter-spacing: -0.005em;
  white-space: nowrap;
}
.lh-tot-final-row .lh-tot-v {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 22pt;
  color: var(--accent);
  letter-spacing: -0.02em;
  line-height: 1;
  white-space: nowrap;
}
.lh-tot-perpax {
  margin-top: 1mm;
  font-size: 8pt;
  color: var(--lh-muted);
  text-align: right;
  font-style: italic;
}
.lh-tot-perpax b {
  color: var(--lh-ink);
  font-weight: 600;
  font-style: normal;
}
.lh-tot-hint {
  margin-top: 2mm;
  font-size: 7.5pt;
  color: var(--lh-mute2);
  text-align: right;
  font-style: italic;
  line-height: 1.4;
}

/* Editable per il prezzo riservato finale */
.lh-edit.lh-edit-price {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 1em;
  color: inherit;
  min-width: 1.5em;
  display: inline;
  white-space: nowrap;
}
.lh-edit.lh-edit-price:focus {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 2px;
}


/* ============================================================
   PAGAMENTO
   ============================================================ */
.lh-e-pay {
  display: grid;
}
.lh-e-pay-row {
  display: grid;
  grid-template-columns: 30mm 1fr;
  gap: 10px;
  padding: calc(1.3mm * var(--dens)) 0;
  border-bottom: 1px solid var(--lh-hairline);
  align-items: baseline;
}
.lh-e-pay-row:first-child { border-top: 1px solid var(--lh-hairline); }
.lh-e-pay-k {
  font-size: 7.5pt;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
}
.lh-e-pay-v {
  font-size: 9.5pt;
  color: var(--lh-ink);
  line-height: 1.5;
}
.lh-e-note {
  margin: calc(2.5mm * var(--dens)) 0 0 0;
  font-size: 7.5pt;
  line-height: 1.5;
  color: var(--lh-muted);
  max-width: 56em;
  font-style: italic;
}

/* ============================================================
   FIRME
   ============================================================ */
.lh-e-sign {
  position: relative;
  z-index: 1;
  margin-top: calc(5mm * var(--dens));
  page-break-inside: avoid;
  break-inside: avoid;
}
.lh-e-cordially {
  margin: 0 0 calc(6mm * var(--dens)) 0;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 11pt;
  color: var(--lh-ink);
  font-weight: 400;
}
.lh-e-sign-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16mm;
}
.lh-e-sign-line {
  border-top: 1px solid var(--lh-ink);
  margin-bottom: 6px;
}
.lh-e-sign-cap {
  font-size: 8.5pt;
  font-weight: 600;
  color: var(--lh-ink);
  margin-bottom: 2px;
}
.lh-e-sign-sub {
  font-size: 7.5pt;
  letter-spacing: 0.06em;
  color: var(--lh-muted);
}

/* ============================================================
   FOOTER
   ============================================================ */
.lh-e-footer {
  position: static;
  z-index: 1;
  margin-top: calc(10mm * var(--dens));
  padding-top: 4mm;
  border-top: 1px solid var(--lh-hairline);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  align-items: center;
  font-size: 7pt;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--lh-muted);
  font-weight: 500;
  page-break-inside: avoid;
  break-inside: avoid;
}
.lh-e-footer-l b { color: var(--lh-ink); font-weight: 600; }
.lh-e-footer-c { text-align: center; }
.lh-e-footer-r { text-align: right; }

/* ============================================================
   EDITABLE FIELDS
   ============================================================ */
.lh-edit {
  display: inline-block;
  min-width: 1ch;
  outline: none;
  border-radius: 2px;
  padding: 0 2px;
  margin: 0 -2px;
  cursor: text;
  transition: background .15s, box-shadow .15s;
}
.lh-edit:empty::before {
  content: attr(data-placeholder);
  color: var(--lh-mute2);
  font-style: italic;
}
.lh-edit:hover {
  background: rgba(123, 137, 201, 0.07);
}
.lh-edit:focus {
  background: #FFF8DC;
  box-shadow: 0 0 0 2px rgba(123, 137, 201, 0.35);
}
.lh-edit-inline {
  font-weight: 600;
  color: var(--accent);
  min-width: 1.5ch;
  text-align: center;
  white-space: nowrap;
}

/* ============================================================
   ACTION BAR (toolbar fissa, fuori dalla pagina)
   ============================================================ */
.lh-actionbar {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 8px;
  background: rgba(27, 26, 32, 0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 8px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.lh-actionbar button {
  background: transparent;
  color: #fff;
  border: 0;
  padding: 8px 14px;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.005em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background .15s;
}
.lh-actionbar button:hover {
  background: rgba(255,255,255,0.12);
}
/* Segmented control per pricing mode */
.lh-ab-segment {
  display: inline-flex;
  align-items: center;
  background: rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 2px;
  margin: 0 4px;
}
.lh-ab-segment button {
  padding: 6px 10px !important;
  font-size: 12px !important;
  border-radius: 6px !important;
  color: rgba(255,255,255,0.65) !important;
  background: transparent !important;
}
.lh-ab-segment button.on {
  background: rgba(255,255,255,0.18) !important;
  color: #fff !important;
  font-weight: 600 !important;
}
.lh-actionbar button.primary {
  background: var(--lh-accent-default);
  color: #fff;
}
.lh-actionbar button.primary:hover {
  background: #6E7CBC;
}
.lh-actionbar .lh-ab-hint {
  display: inline-flex;
  align-items: center;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

// ─────────────────────────────────────────────────────────────
// Hook: stato persistito in localStorage
// ─────────────────────────────────────────────────────────────
function usePersistedData() {
  const [data, setData] = React.useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return { ...defaultData, ...JSON.parse(saved) };
    } catch (e) {}
    return defaultData;
  });
  React.useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
  }, [data]);

  const update = (key, val) => setData((d) => ({ ...d, [key]: val }));

  // Sezioni del menu (solo descrittive)
  const updateSezione = (idx, key, val) => setData((d) => {
    const arr = [...d.sezioniMenu];
    arr[idx] = { ...arr[idx], [key]: val };
    return { ...d, sezioniMenu: arr };
  });
  const addSezione = () => setData((d) => ({
    ...d,
    sezioniMenu: [...d.sezioniMenu, {
      id: "s" + Date.now(),
      label: "Nuova sezione",
      desc: "Descrizione delle voci incluse.",
    }]
  }));
  const removeSezione = (idx) => setData((d) => ({
    ...d,
    sezioniMenu: d.sezioniMenu.filter((_, i) => i !== idx)
  }));

  // Extras
  const updateExtra = (idx, key, val) => setData((d) => {
    const arr = [...d.extras];
    arr[idx] = { ...arr[idx], [key]: val };
    return { ...d, extras: arr };
  });
  const addExtra = () => setData((d) => ({
    ...d,
    extras: [...d.extras, {
      id: "e" + Date.now(),
      label: "Nuovo extra",
      q: "",
      price: 0,
      kind: "fixed",
      offerto: false,
    }]
  }));
  const removeExtra = (idx) => setData((d) => ({
    ...d,
    extras: d.extras.filter((_, i) => i !== idx)
  }));

  const reset = () => {
    if (confirm("Ripristinare i valori di default? Tutte le modifiche andranno perse.")) {
      setData(defaultData);
    }
  };

  const applyPreset = (presetData) => {
    setData((d) => ({ ...d, ...presetData }));
  };

  return {
    data, setData, update,
    updateSezione, addSezione, removeSezione,
    updateExtra, addExtra, removeExtra,
    reset, applyPreset,
  };
}

// ─────────────────────────────────────────────────────────────
// Hook: preset sincronizzati su Firestore
// ─────────────────────────────────────────────────────────────
function usePresets() {
  const [presets, setPresets] = React.useState([]);
  const [fbReady, setFbReady] = React.useState(!!window.__fb);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    if (window.__fb) { setFbReady(true); return; }
    const onReady = () => setFbReady(true);
    window.addEventListener("fb-ready", onReady);
    return () => window.removeEventListener("fb-ready", onReady);
  }, []);

  React.useEffect(() => {
    if (!fbReady) return;
    const { db, collection, query, orderBy, onSnapshot } = window.__fb;
    const q = query(collection(db, "presets"), orderBy("name"));
    const unsub = onSnapshot(q,
      (snap) => {
        setPresets(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
        setError(null);
      },
      (err) => setError(err.message || String(err))
    );
    return () => unsub();
  }, [fbReady]);

  const pickPresetFields = (data) => {
    const p = {};
    PRESET_FIELDS.forEach((k) => { if (data[k] !== undefined) p[k] = data[k]; });
    return p;
  };

  const savePreset = async (name, data) => {
    const { db, collection, addDoc, serverTimestamp } = window.__fb;
    await addDoc(collection(db, "presets"), {
      name: String(name).trim(),
      data: pickPresetFields(data),
      updatedAt: serverTimestamp(),
    });
  };

  const updatePreset = async (id, data) => {
    const { db, doc, updateDoc, serverTimestamp } = window.__fb;
    await updateDoc(doc(db, "presets", id), {
      data: pickPresetFields(data),
      updatedAt: serverTimestamp(),
    });
  };

  const deletePreset = async (id) => {
    const { db, doc, deleteDoc } = window.__fb;
    await deleteDoc(doc(db, "presets", id));
  };

  return { presets, fbReady, error, savePreset, updatePreset, deletePreset };
}

// ─────────────────────────────────────────────────────────────
// PresetModal — lista preset + azioni
// ─────────────────────────────────────────────────────────────
function PresetModal({ open, onClose, data, onApply }) {
  const { presets, fbReady, error, savePreset, updatePreset, deletePreset } = usePresets();
  const [name, setName] = React.useState("");
  const [confirmDel, setConfirmDel] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);

  React.useEffect(() => {
    if (!open) { setConfirmDel(null); setMsg(null); }
  }, [open]);

  if (!open) return null;

  const handleSave = async () => {
    if (!name.trim()) return;
    setBusy(true); setMsg(null);
    try { await savePreset(name, data); setName(""); setMsg("Preset salvato"); }
    catch (e) { setMsg("Errore: " + (e.message || e)); }
    finally { setBusy(false); }
  };

  const handleUpdate = async (id) => {
    setBusy(true); setMsg(null);
    try { await updatePreset(id, data); setMsg("Preset aggiornato"); }
    catch (e) { setMsg("Errore: " + (e.message || e)); }
    finally { setBusy(false); }
  };

  const handleDelete = async (id) => {
    setBusy(true); setMsg(null);
    try { await deletePreset(id); setConfirmDel(null); }
    catch (e) { setMsg("Errore: " + (e.message || e)); }
    finally { setBusy(false); }
  };

  const summary = (p) => {
    const sezN = p.data?.sezioniMenu?.length || 0;
    const extN = p.data?.extras?.length || 0;
    const mppg = parseFloatSafe(p.data?.menuPricePerGuest) || 0;
    return `${sezN} sezioni · ${extN} extra · ${mppg} €/persona`;
  };

  return (
    <div className="lh-modal-backdrop no-print" onClick={onClose}>
      <div className="lh-modal" onClick={(e) => e.stopPropagation()}>
        <header className="lh-modal-h">
          <div>
            <h2>Preset menu</h2>
            <p>I preset sono condivisi tra tutti i dispositivi via cloud.</p>
          </div>
          <button className="lh-modal-x" onClick={onClose} aria-label="Chiudi">×</button>
        </header>

        <div className="lh-modal-body">
          {!fbReady && <div className="lh-modal-info">Connessione al cloud in corso…</div>}
          {error && <div className="lh-modal-error">Errore di connessione: {error}</div>}
          {fbReady && !error && presets.length === 0 && (
            <div className="lh-modal-empty">
              Nessun preset salvato.<br/>
              Configura il preventivo come vuoi, poi salvalo come preset usando il campo qui sotto.
            </div>
          )}

          {presets.length > 0 && (
            <ul className="lh-preset-list">
              {presets.map((p) => (
                <li key={p.id} className="lh-preset-item">
                  <div className="lh-preset-info">
                    <div className="lh-preset-name">{p.name}</div>
                    <div className="lh-preset-meta">{summary(p)}</div>
                  </div>
                  <div className="lh-preset-actions">
                    {confirmDel === p.id ? (
                      <div className="lh-preset-confirm">
                        <span>Sicuro?</span>
                        <button className="danger" disabled={busy} onClick={() => handleDelete(p.id)}>Sì, elimina</button>
                        <button onClick={() => setConfirmDel(null)}>No</button>
                      </div>
                    ) : (
                      <>
                        <button className="primary"
                                onClick={() => { onApply(p.data); onClose(); }}>
                          Applica
                        </button>
                        <button title="Sovrascrivi questo preset con la configurazione corrente"
                                disabled={busy}
                                onClick={() => handleUpdate(p.id)}>
                          Aggiorna
                        </button>
                        <button className="danger-ghost"
                                onClick={() => setConfirmDel(p.id)}>
                          Elimina
                        </button>
                      </>
                    )}
                  </div>
                </li>
              ))}
            </ul>
          )}
        </div>

        <footer className="lh-modal-f">
          <div className="lh-modal-save">
            <input
              type="text"
              placeholder="Nome nuovo preset (es. Compleanno standard)"
              value={name}
              onChange={(e) => setName(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && handleSave()}
            />
            <button className="primary"
                    disabled={!name.trim() || !fbReady || busy}
                    onClick={handleSave}>
              + Salva configurazione attuale
            </button>
          </div>
          {msg && <div className="lh-modal-msg">{msg}</div>}
        </footer>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Editable: contentEditable wrapper
// ─────────────────────────────────────────────────────────────
function Editable({ value, onChange, className = "", placeholder = "", as = "span", multiline = false, numeric = false, ...rest }) {
  const ref = React.useRef(null);
  const [editing, setEditing] = React.useState(false);
  React.useEffect(() => {
    if (ref.current && !editing && ref.current.textContent !== String(value ?? "")) {
      ref.current.textContent = String(value ?? "");
    }
  }, [value, editing]);
  const handleBlur = () => {
    setEditing(false);
    const txt = ref.current.textContent.trim();
    if (numeric) {
      const num = parseFloat(txt.replace(",", "."));
      onChange(isNaN(num) ? 0 : num);
    } else {
      onChange(txt);
    }
  };
  const handleKey = (e) => {
    if (!multiline && e.key === "Enter") {
      e.preventDefault();
      ref.current.blur();
    }
    if (e.key === "Escape") {
      ref.current.textContent = String(value ?? "");
      ref.current.blur();
    }
  };
  const Tag = as;
  return (
    <Tag
      ref={ref}
      className={`lh-edit ${className}`}
      contentEditable
      suppressContentEditableWarning
      spellCheck={false}
      onFocus={() => setEditing(true)}
      onBlur={handleBlur}
      onKeyDown={handleKey}
      data-placeholder={placeholder}
      {...rest}
    />
  );
}

// ─────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────
function fmtEur(n) {
  if (typeof n !== "number" || isNaN(n)) return "—";
  return new Intl.NumberFormat("it-IT", { style: "currency", currency: "EUR", minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
}
function fmtEurDec(n) {
  if (typeof n !== "number" || isNaN(n)) return "—";
  return new Intl.NumberFormat("it-IT", { style: "currency", currency: "EUR", minimumFractionDigits: 2 }).format(n);
}
function parseFloatSafe(v) {
  if (typeof v === "number") return v;
  const n = parseFloat(String(v).replace(",", "."));
  return isNaN(n) ? 0 : n;
}

// ─────────────────────────────────────────────────────────────
// Watermark
// ─────────────────────────────────────────────────────────────
function Watermark({ show }) {
  if (!show) return null;
  return (
    <div className="lh-watermark" aria-hidden="true">
      <img src={NIMBUS_LOGO} alt="" />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SezioneMenu — sezione descrittiva (Food, Beverage, …)
// ─────────────────────────────────────────────────────────────
function SezioneMenuRow({ sez, idx, onUpdate, onRemove }) {
  return (
    <div className="lh-sez">
      <button className="lh-sez-del no-print" onClick={() => onRemove(idx)} title="Rimuovi sezione">×</button>
      <div className="lh-sez-main">
        <div className="lh-sez-head">
          <Editable
            className="lh-sez-label"
            value={sez.label}
            onChange={(v) => onUpdate(idx, "label", v)}
            placeholder="Nome sezione"
          />
        </div>
        <div className="lh-sez-desc">
          <Editable
            value={sez.desc}
            onChange={(v) => onUpdate(idx, "desc", v)}
            placeholder="Descrizione delle voci incluse"
            multiline
          />
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// ExtraRow
// ─────────────────────────────────────────────────────────────
function ExtraRow({ ex, idx, ospiti, onUpdate, onRemove, L }) {
  const n = parseInt(ospiti, 10) || 0;
  const price = parseFloatSafe(ex.price);
  const total = ex.kind === "perGuest" ? price * n : price;
  const offerto = !!ex.offerto;
  return (
    <div className={"lh-extra" + (offerto ? " lh-extra-offerto" : "")}>
      <button className="lh-extra-del no-print" onClick={() => onRemove(idx)} title="Rimuovi extra">×</button>
      <div className="lh-extra-main">
        <div className="lh-extra-head">
          <Editable
            className="lh-extra-label"
            value={ex.label}
            onChange={(v) => onUpdate(idx, "label", v)}
            placeholder="Nome extra"
          />
          {offerto && <span className="lh-omaggio-tag">Omaggio</span>}
        </div>
        <div className="lh-extra-desc">
          <Editable
            value={ex.q}
            onChange={(v) => onUpdate(idx, "q", v)}
            placeholder="Breve descrizione"
            multiline
          />
        </div>
        <button
          type="button"
          className={"lh-omaggio-toggle no-print" + (offerto ? " on" : "")}
          onClick={() => onUpdate(idx, "offerto", !offerto)}
          title={offerto ? "Annulla omaggio" : "Segna come omaggio (escluso dal totale)"}
        >
          {offerto ? "✓ Omaggio" : "Segna come omaggio"}
        </button>
      </div>
      <div className="lh-extra-price">
        <div className="lh-extra-ppg">
          <Editable
            className="lh-edit-num"
            value={price}
            onChange={(v) => onUpdate(idx, "price", typeof v === "number" ? v : parseFloatSafe(v))}
            numeric
          />
          <span className="lh-extra-unit">
            {" "}€{" "}
            <button
              type="button"
              className="lh-extra-kind no-print"
              onClick={() => onUpdate(idx, "kind", ex.kind === "perGuest" ? "fixed" : "perGuest")}
              title="Cambia tipo (forfait / a persona)"
            >
              {ex.kind === "perGuest" ? L.perGuest : L.fixed}
            </button>
            <span className="lh-extra-kind-print only-print">
              {ex.kind === "perGuest" ? " " + L.perGuest : ""}
            </span>
          </span>
        </div>
        <div className="lh-extra-subtotal">
          {ex.kind === "perGuest" && (
            <span className="lh-extra-formula no-print">×{n} = </span>
          )}
          <span className="lh-extra-amount">{fmtEur(total)}</span>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// NIMBUS LETTERHEAD
// ─────────────────────────────────────────────────────────────
function NimbusLetterhead({ tweaks }) {
  const t = tweaks;
  const L = STRINGS[t.lang] || STRINGS.it;
  const dens = t.density === "compact" ? 0.85 : t.density === "comfy" ? 1.18 : 1;

  const {
    data, update,
    updateSezione, addSezione, removeSezione,
    updateExtra, addExtra, removeExtra,
    reset, applyPreset,
  } = usePersistedData();

  const [presetsOpen, setPresetsOpen] = React.useState(false);

  React.useEffect(() => { window.__nimbusReset = reset; }, [reset]);
  React.useEffect(() => {
    window.__nimbusOpenPresets = () => setPresetsOpen(true);
  }, []);

  // ─── Calcoli ───────────────────────────────────────────────
  const n = parseInt(data.ospiti, 10) || 0;

  const menuPpg = parseFloatSafe(data.menuPricePerGuest);
  const totaleMenu = menuPpg * n;
  const totaleExtras = (data.extras || []).reduce(
    (acc, ex) => {
      if (ex.offerto) return acc;  // gli omaggi non contano
      return acc + (ex.kind === "perGuest" ? parseFloatSafe(ex.price) * n : parseFloatSafe(ex.price));
    },
    0
  );
  const totaleListino = totaleMenu + totaleExtras;

  const prezzoRiservato = parseFloatSafe(data.prezzoRiservato);
  // Lo sconto è attivo solo se prezzoRiservato > 0 e < totaleListino
  const scontoAttivo = prezzoRiservato > 0 && prezzoRiservato < totaleListino;
  const totaleFinale = scontoAttivo ? prezzoRiservato : totaleListino;
  const scontoEur = scontoAttivo ? totaleListino - prezzoRiservato : 0;
  const scontoPct = scontoAttivo && totaleListino > 0
    ? Math.round((scontoEur / totaleListino) * 100)
    : 0;

  // Pagamento basato sul totale finale
  const accontoPct = parseFloat(data.acconto) || 0;
  const accontoEur = totaleFinale * (accontoPct / 100);
  const saldoEur = totaleFinale - accontoEur;

  // Prezzo €/persona effettivo (utile per il cliente nel caso di sconto)
  const prezzoEffPersona = n > 0 ? Math.round((totaleFinale / n) * 100) / 100 : 0;

  return (
    <React.Fragment>
    <div className="lh-page lh-cloud" style={{
      "--accent": t.accent,
      "--dens": dens,
    }}>
      <Watermark show={t.showWatermark} />

      {/* HEADER */}
      <header className="lh-e-header">
        <div className="lh-e-logo">
          <img src={NIMBUS_LOGO} alt="Nimbus" />
        </div>
        <div className="lh-e-header-meta">
          <div className="lh-field">
            <div className="lh-field-k">{L.rif}</div>
            <div className="lh-field-v">
              <Editable value={data.rif} onChange={(v) => update("rif", v)} />
            </div>
          </div>
          <div className="lh-field">
            <div className="lh-field-k">{L.data}</div>
            <div className="lh-field-v">
              <Editable value={data.dataDoc} onChange={(v) => update("dataDoc", v)} />
            </div>
          </div>
          <div className="lh-field">
            <div className="lh-field-k">{L.luogo}</div>
            <div className="lh-field-v">
              <Editable value={data.luogo} onChange={(v) => update("luogo", v)} />
            </div>
          </div>
        </div>
      </header>
      <div className="lh-e-rule" />

      {/* DESTINATARIO + OGGETTO */}
      <section className="lh-e-recipient-grid">
        <div>
          <div className="lh-e-spettile">{L.spettile}</div>
          <div className="lh-e-name">
            <Editable value={data.cliente} onChange={(v) => update("cliente", v)} />
          </div>
          <div className="lh-e-addr">
            <Editable value={data.indirizzo} onChange={(v) => update("indirizzo", v)} />
            <br/>
            <Editable value={data.fiscale} onChange={(v) => update("fiscale", v)} />
          </div>
        </div>
        <div>
          <div className="lh-e-spettile">{L.oggetto}</div>
          <h1 className="lh-e-subject-text">
            <Editable value={data.oggetto} onChange={(v) => update("oggetto", v)} multiline />
          </h1>
        </div>
      </section>

      {/* INTRO */}
      <section className="lh-e-body">
        <p>
          <Editable value={data.intro} onChange={(v) => update("intro", v)} multiline />
        </p>
      </section>

      {/* MENU — sezioni a persona */}
      <section className="lh-e-section">
        <div className="lh-e-section-head">
          <span className="lh-e-section-num">01</span>
          <h2 className="lh-e-section-title">{L.menuTitle}</h2>
        </div>
        <p className="lh-e-section-intro">
          {L.menuIntro}{" "}
          <Editable value={data.ospiti} onChange={(v) => update("ospiti", v)} className="lh-edit-inline" />{" "}
          {L.menuIntroEnd}
        </p>

        <div className="lh-sezioni">
          {(data.sezioniMenu || []).map((s, i) => (
            <SezioneMenuRow
              key={s.id || i}
              sez={s}
              idx={i}
              onUpdate={updateSezione}
              onRemove={removeSezione}
            />
          ))}
          <div className="lh-add-row no-print">
            <button onClick={addSezione}>+ Aggiungi sezione</button>
          </div>
        </div>

        {/* Prezzo menu cumulato */}
        <div className="lh-menu-price">
          <div className="lh-menu-price-l">
            <span className="lh-menu-price-k">Prezzo menu</span>
            <span className="lh-menu-price-sub">food + beverage, tutto incluso</span>
          </div>
          <div className="lh-menu-price-r">
            <div className="lh-menu-price-ppg">
              <Editable
                className="lh-edit-price"
                value={menuPpg}
                onChange={(v) => update("menuPricePerGuest", typeof v === "number" ? v : parseFloatSafe(v))}
                numeric
              />
              <span className="lh-menu-price-unit"> € / persona</span>
            </div>
            <div className="lh-menu-price-tot">
              <span className="lh-menu-price-formula">× {n} ospiti = </span>
              <b>{fmtEur(totaleMenu)}</b>
            </div>
          </div>
        </div>

        {/* EXTRAS */}
        {((data.extras || []).length > 0 || true) && (
          <div className="lh-extras-block">
            <h3 className="lh-extras-head">{L.extrasTitle}</h3>
            <div className="lh-extras">
              {(data.extras || []).map((ex, i) => (
                <ExtraRow
                  key={ex.id || i}
                  ex={ex}
                  idx={i}
                  ospiti={data.ospiti}
                  onUpdate={updateExtra}
                  onRemove={removeExtra}
                  L={L}
                />
              ))}
              <div className="lh-add-row no-print">
                <button onClick={addExtra}>+ Aggiungi extra</button>
              </div>
            </div>
          </div>
        )}

        {/* TOTALI — listino + sconto + riservato */}
        <div className="lh-totali">
          <div className={"lh-tot-listino" + (scontoAttivo ? " has-discount" : "")}>
            <span className="lh-tot-k">{L.totaleListino}</span>
            <span className="lh-tot-v">{fmtEur(totaleListino)}</span>
          </div>

          {scontoAttivo && (
            <div className="lh-tot-sconto">
              <span className="lh-tot-k">{L.scontoApplicato}</span>
              <span className="lh-tot-v">
                −{fmtEur(scontoEur)}
                <span className="lh-tot-pct"> ({scontoPct}%)</span>
              </span>
            </div>
          )}

          <div className="lh-tot-final">
            <div className="lh-tot-final-row">
              <span className="lh-tot-k">{scontoAttivo ? L.prezzoRiservato : "Totale"}</span>
              <span className="lh-tot-v">
                <Editable
                  className="lh-edit-price"
                  value={scontoAttivo ? prezzoRiservato : totaleListino}
                  onChange={(v) => update("prezzoRiservato", typeof v === "number" ? v : parseFloatSafe(v))}
                  numeric
                /> €
              </span>
            </div>
            {n > 0 && totaleFinale > 0 && (
              <div className="lh-tot-perpax">
                <span>equivalenti a <b>{prezzoEffPersona} € a persona</b> · {n} ospiti</span>
              </div>
            )}
            <div className="lh-tot-hint no-print">
              Clicca sul totale per inserire un prezzo riservato (con sconto). Lascia 0 o uguale al listino per disattivare lo sconto.
            </div>
          </div>
        </div>
      </section>

      {/* PAGAMENTO */}
      <section className="lh-e-section">
        <div className="lh-e-section-head">
          <span className="lh-e-section-num">02</span>
          <h2 className="lh-e-section-title">{L.paymentTitle}</h2>
        </div>
        <div className="lh-e-pay">
          <div className="lh-e-pay-row">
            <div className="lh-e-pay-k">{L.acconto}</div>
            <div className="lh-e-pay-v">
              <Editable value={data.acconto} onChange={(v) => update("acconto", v)} className="lh-edit-inline" />%
              {" "}all'accettazione del preventivo — <b>{fmtEurDec(accontoEur)}</b>
            </div>
          </div>
          <div className="lh-e-pay-row">
            <div className="lh-e-pay-k">{L.saldo}</div>
            <div className="lh-e-pay-v">
              entro{" "}
              <Editable value={data.saldoGiorni} onChange={(v) => update("saldoGiorni", v)} className="lh-edit-inline" />{" "}
              giorni dalla data dell'evento — <b>{fmtEurDec(saldoEur)}</b>
            </div>
          </div>
          <div className="lh-e-pay-row">
            <div className="lh-e-pay-k">Metodo</div>
            <div className="lh-e-pay-v">
              Bonifico bancario su IBAN{" "}
              <Editable value={data.iban} onChange={(v) => update("iban", v)} style={{fontFamily:'ui-monospace, "SF Mono", monospace', fontSize:'0.95em'}} />
              <br/>
              intestato a{" "}
              <Editable value={data.intestatario} onChange={(v) => update("intestatario", v)} />.
            </div>
          </div>
          <div className="lh-e-pay-row">
            <div className="lh-e-pay-k">Causale</div>
            <div className="lh-e-pay-v">Indicare nome cliente e data evento.</div>
          </div>
        </div>
        <p className="lh-e-note">
          Preventivo valido{" "}
          <Editable value={data.validitaGiorni} onChange={(v) => update("validitaGiorni", v)} className="lh-edit-inline" />{" "}
          giorni dalla data di emissione. La conferma definitiva avverrà al ricevimento dell'acconto. In caso di disdetta meno di{" "}
          <Editable value={data.disdettaGiorni} onChange={(v) => update("disdettaGiorni", v)} className="lh-edit-inline" />{" "}
          giorni prima dell'evento, l'acconto non sarà rimborsabile.
        </p>
      </section>

      {/* FOOTER */}
      <footer className="lh-e-footer">
        <div className="lh-e-footer-l"><b>Nimbus</b></div>
        <div className="lh-e-footer-c">{L.nimbusContact}</div>
        <div className="lh-e-footer-r">[ Pag. 1 ]</div>
      </footer>
    </div>

    <PresetModal
      open={presetsOpen}
      onClose={() => setPresetsOpen(false)}
      data={data}
      onApply={applyPreset}
    />
    </React.Fragment>
  );
}

Object.assign(window, { NimbusLetterhead, defaultData, STRINGS });

</script>

    "accent": "#7B89C9",
    "density": "regular",
    "lang": "it",

  }/*EDITMODE-END*/;

  function NimbusApp() {

            ☰ Preset
          </button>
          <button className="primary" onClick={() => window.print()}>
            <span style={{fontSize:14}}>↓</span> Scarica PDF
          </button>
          <button onClick={() => window.__nimbusReset && window.__nimbusReset()}>

          </button>
        </div>

        <div className="lh-stage">
          <NimbusLetterhead tweaks={t} />

        <TweaksPanel>

          <TweakButton label="Stampa / Salva PDF" onClick={() => window.print()} />

          <TweakSection label="Colore accento" />
          <TweakColor label="Accento" value={t.accent} onChange={(v) => setTweak('accent', v)} />
          <div style={{display:'flex', gap:6, flexWrap:'wrap', marginTop:2}}>
            {[
              ['Pervinca', '#7B89C9'],
              ['Notte',    '#2E3258'],
              ['Salvia',   '#8AA28A'],
              ['Terra',    '#B5715A'],
              ['Carbone',  '#1B1A20'],
            ].map(([name, hex]) => (
              <button key={hex}
                onClick={() => setTweak('accent', hex)}
                title={name}
                style={{

                  background: hex, cursor: 'default',

          <TweakSection label="Layout" />

            onChange={(v) => setTweak('density', v)}

          <TweakRadio
            label="Lingua"
            value={t.lang}
            options={[
              { value: 'it', label: 'IT' },
              { value: 'en', label: 'EN' },

            onChange={(v) => setTweak('lang', v)}
          />

          <TweakSection label="Elementi" />
          <TweakToggle label="Filigrana logo" value={t.showWatermark}
                       onChange={(v) => setTweak('showWatermark', v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<NimbusApp />);
</script>
